# services 就像是一个“部门列表”，告诉 Docker 你要启动哪些服务（比如代码运行环境、数据库等）
services:

  # llm-lab 是这个服务的名字（你可以随便起，比如 my-app）。
  # 以后你运行命令时就会用到它，比如：docker compose run llm-lab ...
  llm-lab:

    # build 部分定义了“如何制作这个服务的镜像”
    build:
      # context 表示“构建上下文”，即 Docker 应该去哪个文件夹找文件。
      # . 代表当前文件夹（即 llm_from_scratch 根目录）。
      context: .
      
      # dockerfile 指定用哪个“菜谱”来制作镜像。
      # 我们刚才写的文件名就叫 Dockerfile。
      dockerfile: Dockerfile

    # image 给构建出来的镜像起一个正式的名字。
    # 这样即便你手动运行 docker images，也能一眼认出这个镜像。
    image: llm_from_scratch:latest

    # volumes 是“目录映射（挂载）”，这是最核心的功能！
    # 格式为：宿主机路径:容器内路径
    # .:/app 的意思是：把我 WSL 里的当前目录（.）和容器里的 /app 目录“打通”。
    # 意义：你在 IDE 里改了代码，容器里的代码会瞬间同步，不需要重新 build 镜像。
    volumes:
      - .:/app

    # stdin_open 相当于开启了容器的“耳朵”。
    # 它的全称是 Standard Input Open，允许你以后向容器发送指令。
    stdin_open: true

    # tty 相当于给容器配了一个“显示器”。
    # 开启它之后，你在终端看到的输出会有颜色，且支持交互（比如输入 y/n）。
    tty: true

    # command 是“默认动作”。
    # 当你只输入 docker compose up 时，它就会自动运行这一行。
    # 我们默认运行第一章的形状演示脚本，作为环境检查。
    command: ["sleep", "infinity"]
